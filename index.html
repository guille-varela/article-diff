<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Article Diff · Prototipo</title>
  <style>
    :root { color-scheme: light dark; }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      background: #0f1115;
      color: #e7e9ee;
      padding: 24px;
    }
    .wrap { max-width: 560px; width: 100%; }
    h1 { font-size: 1.9rem; margin: 0 0 8px; }
    p.lead { margin: 0 0 28px; color: #9aa0ad; line-height: 1.5; }
    .cards { display: grid; gap: 16px; }
    a.card {
      display: block;
      text-decoration: none;
      color: inherit;
      background: #181b22;
      border: 1px solid #262b36;
      border-radius: 14px;
      padding: 20px 22px;
      transition: border-color .15s ease, transform .15s ease;
    }
    a.card:hover { border-color: #4c8bf5; transform: translateY(-2px); }
    a.card h2 { margin: 0 0 6px; font-size: 1.15rem; }
    a.card span { color: #9aa0ad; font-size: .92rem; }
    footer { margin-top: 28px; color: #6b7180; font-size: .82rem; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Article Diff</h1>
    <p class="lead">Prototipo de control de versiones y ramas para edición de artículos. Elige una vista:</p>
    <div class="cards">
      <a class="card" href="editor-versiones.html">
        <h2>✍️ Editor de versiones y ramas</h2>
        <span>Crea, edita y ramifica versiones de un artículo.</span>
      </a>
      <a class="card" href="visor-versiones.html">
        <h2>👁️ Visor de versiones</h2>
        <span>Compara y revisa el historial de cambios.</span>
      </a>
    </div>
    <footer>Prototipo · solo para revisión interna del equipo.</footer>
  </div>
</body>
</html>
