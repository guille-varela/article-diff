<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Editor · Visor de versiones</title>
<style>
  :root{
    --bg:#f6f7f9; --panel:#ffffff; --ink:#1f2430; --muted:#6b7280; --line:#e5e7eb;
    --accent:#2563eb; --accent-soft:#eff4ff;
    --add-bg:#e6ffed; --add-line:#22863a; --add-word:#aaf2c0;
    --del-bg:#ffeef0; --del-line:#cb2431; --del-word:#ffc4cc;
    --shadow:0 1px 3px rgba(16,24,40,.08),0 1px 2px rgba(16,24,40,.04);
    --radius:12px;
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:var(--bg);color:var(--ink);font-size:15px;line-height:1.6}
  .app{display:grid;grid-template-columns:300px 1fr;height:100vh}

  /* ---------- Sidebar ---------- */
  aside{background:var(--panel);border-right:1px solid var(--line);display:flex;flex-direction:column;min-height:0}
  .side-head{padding:18px 18px 12px;border-bottom:1px solid var(--line)}
  .side-head h1{margin:0;font-size:13px;letter-spacing:.04em;text-transform:uppercase;color:var(--muted)}
  .side-head p{margin:4px 0 0;font-size:13px;color:var(--muted)}
  .versions{overflow:auto;padding:10px;flex:1;min-height:0}
  .vcard{position:relative;padding:11px 12px 11px 34px;border-radius:10px;cursor:pointer;margin-bottom:4px;border:1px solid transparent}
  .vcard:hover{background:var(--bg)}
  .vcard.active{background:var(--accent-soft);border-color:#cfe0ff}
  .vcard::before{content:"";position:absolute;left:15px;top:18px;width:9px;height:9px;border-radius:50%;
    background:#cdd3dc;border:2px solid var(--panel);box-shadow:0 0 0 1px #cdd3dc}
  .vcard.active::before{background:var(--accent);box-shadow:0 0 0 1px var(--accent)}
  .versions::after{}
  .rail{position:absolute;left:19px;top:14px;bottom:14px;width:2px;background:var(--line)}
  .vtop{display:flex;justify-content:space-between;align-items:baseline;gap:8px}
  .vlabel{font-weight:600;font-size:14px}
  .vcur{font-size:10px;font-weight:700;color:#fff;background:var(--accent);padding:1px 6px;border-radius:20px;letter-spacing:.03em}
  .vmeta{display:flex;align-items:center;gap:7px;margin-top:5px;color:var(--muted);font-size:12px}
  .avatar{width:18px;height:18px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;
    color:#fff;font-size:9px;font-weight:700}
  .vsum{margin-top:6px;font-size:12px;color:#4b5563;line-height:1.45}
  .pickbar{display:flex;gap:6px;align-items:center;padding:10px 12px;border-top:1px solid var(--line);font-size:12px;color:var(--muted)}
  .pickbar .dot{width:8px;height:8px;border-radius:50%}

  /* ---------- Main ---------- */
  main{display:flex;flex-direction:column;min-width:0;min-height:0}
  .toolbar{background:var(--panel);border-bottom:1px solid var(--line);padding:14px 24px;display:flex;
    align-items:center;gap:18px;flex-wrap:wrap}
  .doc-title{font-size:17px;font-weight:700;margin:0;flex:1;min-width:160px}
  .cmp{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--muted)}
  .cmp select{font:inherit;font-size:13px;padding:5px 8px;border:1px solid var(--line);border-radius:8px;background:#fff;color:var(--ink)}
  .chip{font-size:11px;color:var(--muted)}
  .toggle{display:inline-flex;background:var(--bg);border:1px solid var(--line);border-radius:9px;padding:2px}
  .toggle button{font:inherit;font-size:13px;font-weight:600;border:0;background:transparent;color:var(--muted);
    padding:6px 14px;border-radius:7px;cursor:pointer}
  .toggle button.on{background:#fff;color:var(--ink);box-shadow:var(--shadow)}
  .legend{display:flex;gap:14px;font-size:12px;color:var(--muted);align-items:center;flex-wrap:wrap}
  .legend span{display:inline-flex;align-items:center;gap:5px}
  .sw{width:13px;height:13px;border-radius:3px;display:inline-block}
  .sw.add{background:var(--add-bg);border:1px solid var(--add-line)}
  .sw.del{background:var(--del-bg);border:1px solid var(--del-line)}

  .stage{overflow:auto;padding:28px;flex:1;min-height:0}
  .sheet{max-width:1080px;margin:0 auto}

  /* unified */
  .unified{max-width:760px;margin:0 auto;background:var(--panel);border:1px solid var(--line);
    border-radius:var(--radius);box-shadow:var(--shadow);padding:34px 44px}
  .unified p, .col p{margin:0 0 16px;position:relative}
  .ln{position:relative;padding-left:26px}
  .ln::before{position:absolute;left:0;top:0;font-weight:700;font-size:13px;width:18px;text-align:center;
    border-radius:4px;line-height:1.5}
  .ln.add{background:var(--add-bg);margin:0 -10px 16px;padding:6px 10px 6px 30px;border-radius:6px}
  .ln.add::before{content:"+";color:var(--add-line);left:8px;top:6px}
  .ln.del{background:var(--del-bg);margin:0 -10px 16px;padding:6px 10px 6px 30px;border-radius:6px}
  .ln.del::before{content:"\2212";color:var(--del-line);left:8px;top:6px}
  .ln.del .txt{text-decoration:line-through;text-decoration-color:rgba(203,36,49,.55)}
  .ln.mod{background:#fffdf2;margin:0 -10px 16px;padding:6px 10px 6px 30px;border-radius:6px;border-left:3px solid #e3b341}
  .ln.mod::before{content:"\270E";color:#b08800;left:7px;top:6px;font-size:12px}

  del.w-del,.w-del{background:var(--del-word);color:#86181d;text-decoration:line-through;
    text-decoration-color:rgba(134,24,29,.6);border-radius:3px;padding:0 2px}
  ins.w-add,.w-add{background:var(--add-word);color:#165c2c;text-decoration:underline;
    text-decoration-thickness:2px;border-radius:3px;padding:0 2px}

  /* split */
  .split{display:grid;grid-template-columns:1fr 1fr;gap:18px;align-items:start}
  .col{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);
    overflow:hidden}
  .col-head{padding:11px 20px;border-bottom:1px solid var(--line);font-size:13px;font-weight:600;
    display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;background:var(--panel)}
  .col-head .tag{font-size:11px;font-weight:600;color:var(--muted)}
  .col.old .col-head{background:#fff6f7}
  .col.new .col-head{background:#f4fff7}
  .col-body{padding:26px 28px}
  .row-add{background:var(--add-bg);margin:0 -12px 16px;padding:6px 12px;border-radius:6px}
  .row-del{background:var(--del-bg);margin:0 -12px 16px;padding:6px 12px;border-radius:6px}
  .row-del .txt{text-decoration:line-through;text-decoration-color:rgba(203,36,49,.5)}
  .ghost{visibility:hidden}
  .empty-note{color:var(--muted);font-style:italic;font-size:13px}

  .summary-bar{max-width:760px;margin:0 auto 16px;display:flex;gap:8px;align-items:center;font-size:13px;color:var(--muted)}
  .pill{font-size:12px;font-weight:600;padding:3px 10px;border-radius:20px}
  .pill.add{background:var(--add-bg);color:var(--add-line)}
  .pill.del{background:var(--del-bg);color:var(--del-line)}
  .pill.same{background:var(--bg);color:var(--muted)}
  @media(max-width:880px){ .split{grid-template-columns:1fr} .app{grid-template-columns:1fr} aside{display:none} }
</style>
</head>
<body>
<div class="app">
  <aside>
    <div class="side-head">
      <h1>Historial de versiones</h1>
      <p id="side-sub">Selecciona una versión para ver sus cambios</p>
    </div>
    <div class="versions" id="versions"></div>
    <div class="pickbar">
      <span>Comparando</span>
      <select id="baseSel" class="mini"></select>
      <span>→</span>
      <select id="headSel" class="mini"></select>
    </div>
  </aside>

  <main>
    <div class="toolbar">
      <h2 class="doc-title" id="docTitle">El auge del trabajo remoto</h2>
      <div class="legend">
        <span><span class="sw del"></span> Eliminado <code>(−)</code></span>
        <span><span class="sw add"></span> Añadido <code>(+)</code></span>
      </div>
      <div class="toggle" id="toggle">
        <button data-mode="unified" class="on">Unificada</button>
        <button data-mode="split">Dividida</button>
      </div>
    </div>
    <div class="stage">
      <div class="sheet" id="sheet"></div>
    </div>
  </main>
</div>

<script>
/* ============================================================
   DATOS DE EJEMPLO — 5 versiones de un mismo artículo
   ============================================================ */
const VERSIONS = [
  {
    id:1, label:"Borrador inicial", author:"Guille", color:"#2563eb",
    date:"3 jun, 09:14", summary:"Primera estructura del artículo.",
    text:[
"El trabajo remoto ha dejado de ser una excepción para convertirse en una norma. Cada vez más empresas adoptan modelos flexibles.",
"Los empleados valoran la libertad de organizar su tiempo. Sin embargo, algunos echan de menos el contacto con sus compañeros.",
"Las herramientas digitales han hecho posible esta transición. Sin ellas, la colaboración a distancia sería impensable."
    ].join("\n\n")
  },
  {
    id:2, label:"Añade dato de respaldo", author:"Marta", color:"#7c3aed",
    date:"5 jun, 16:40", summary:"Se incorpora una estadística en la introducción.",
    text:[
"El trabajo remoto ha dejado de ser una excepción para convertirse en una norma. Cada vez más empresas adoptan modelos flexibles.",
"Según un estudio reciente de Stanford, el 60% de los profesionales preferiría mantener un esquema híbrido de forma permanente.",
"Los empleados valoran la libertad de organizar su tiempo. Sin embargo, algunos echan de menos el contacto con sus compañeros.",
"Las herramientas digitales han hecho posible esta transición. Sin ellas, la colaboración a distancia sería impensable."
    ].join("\n\n")
  },
  {
    id:3, label:"Reescritura de la entrada", author:"Guille", color:"#2563eb",
    date:"9 jun, 11:02", summary:"Tono más afirmativo; se matizan dos párrafos.",
    text:[
"El trabajo remoto ha dejado de ser una excepción para convertirse en la norma habitual del mundo laboral. Cada vez más empresas adoptan modelos flexibles y descentralizados.",
"Según un estudio reciente de Stanford, el 60% de los profesionales preferiría mantener un esquema híbrido de forma permanente.",
"Los empleados valoran enormemente la libertad de organizar su tiempo y su espacio. Sin embargo, muchos echan de menos el contacto diario con sus compañeros.",
"Las herramientas digitales han hecho posible esta transición. Sin ellas, la colaboración a distancia sería impensable."
    ].join("\n\n")
  },
  {
    id:4, label:"Equilibra el argumento", author:"Lucía", color:"#0891b2",
    date:"15 jun, 18:25", summary:"Se elimina una frase débil y se añade un cierre.",
    text:[
"El trabajo remoto ha dejado de ser una excepción para convertirse en la norma habitual del mundo laboral. Cada vez más empresas adoptan modelos flexibles y descentralizados.",
"Según un estudio reciente de Stanford, el 60% de los profesionales preferiría mantener un esquema híbrido de forma permanente.",
"Los empleados valoran enormemente la libertad de organizar su tiempo y su espacio. Sin embargo, muchos echan de menos el contacto diario con sus compañeros.",
"El reto, por tanto, no es elegir entre oficina y hogar, sino diseñar culturas de trabajo que combinen lo mejor de ambos mundos."
    ].join("\n\n")
  },
  {
    id:5, label:"Versión publicada", author:"Guille", color:"#2563eb",
    date:"22 jun, 08:50", summary:"Pulido final de estilo antes de publicar.",
    text:[
"El trabajo remoto ha dejado de ser una excepción para convertirse en la norma habitual del mundo laboral. Cada vez más empresas adoptan modelos flexibles, descentralizados y orientados a resultados.",
"Según un estudio de Stanford publicado este año, el 60% de los profesionales preferiría mantener un esquema híbrido de forma permanente.",
"Los empleados valoran enormemente la libertad de organizar su tiempo y su espacio. Aun así, muchos echan de menos el contacto diario con sus compañeros.",
"El reto, por tanto, no es elegir entre oficina y hogar, sino diseñar culturas de trabajo que combinen lo mejor de ambos mundos."
    ].join("\n\n")
  }
];

/* ============================================================
   MOTOR DE DIFF (LCS, sin dependencias externas)
   ============================================================ */
function splitParagraphs(t){ return t.split(/\n\n+/).map(s=>s.trim()).filter(Boolean); }
function splitWords(t){ return t.match(/(\s+|[^\s]+)/g) || []; }
function norm(s){ return s.replace(/\s+/g," ").trim().toLowerCase(); }
function esc(s){ return s.replace(/[&<>]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[c])); }

// Diff genérico por LCS. Devuelve {type:'equal'|'del'|'add', a, b}
function lcsDiff(a, b, eq){
  const n=a.length, m=b.length;
  const dp=Array.from({length:n+1},()=>new Int32Array(m+1));
  for(let i=n-1;i>=0;i--) for(let j=m-1;j>=0;j--)
    dp[i][j]= eq(a[i],b[j]) ? dp[i+1][j+1]+1 : Math.max(dp[i+1][j], dp[i][j+1]);
  const out=[]; let i=0,j=0;
  while(i<n && j<m){
    if(eq(a[i],b[j])){ out.push({type:"equal",a:a[i],b:b[j]}); i++; j++; }
    else if(dp[i+1][j] >= dp[i][j+1]){ out.push({type:"del",a:a[i]}); i++; }
    else { out.push({type:"add",b:b[j]}); j++; }
  }
  while(i<n) out.push({type:"del",a:a[i++]});
  while(j<m) out.push({type:"add",b:b[j++]});
  return out;
}

// Similitud por solapamiento de palabras (Jaccard) para detectar párrafos "modificados"
function similarity(x,y){
  const sx=new Set(norm(x).split(" ")), sy=new Set(norm(y).split(" "));
  let inter=0; sx.forEach(w=>{ if(sy.has(w)) inter++; });
  return inter / (sx.size + sy.size - inter || 1);
}

// Empareja secuencias del+add adyacentes como 'mod' cuando son parecidas
function pairOps(ops){
  const res=[]; let i=0;
  while(i<ops.length){
    if(ops[i].type==="equal"){ res.push(ops[i]); i++; continue; }
    const dels=[], adds=[];
    while(i<ops.length && ops[i].type==="del"){ dels.push(ops[i].a); i++; }
    while(i<ops.length && ops[i].type==="add"){ adds.push(ops[i].b); i++; }
    const k=Math.min(dels.length, adds.length);
    for(let x=0;x<k;x++){
      if(similarity(dels[x],adds[x]) > 0.35) res.push({type:"mod", a:dels[x], b:adds[x]});
      else { res.push({type:"del", a:dels[x]}); res.push({type:"add", b:adds[x]}); }
    }
    for(let x=k;x<dels.length;x++) res.push({type:"del", a:dels[x]});
    for(let x=k;x<adds.length;x++) res.push({type:"add", b:adds[x]});
  }
  return res;
}

// Diff de palabras dentro de un párrafo modificado.
// side: 'both' (unificada) | 'old' | 'new'
function wordDiffHtml(oldT, newT, side){
  const ops=lcsDiff(splitWords(oldT), splitWords(newT), (x,y)=>x===y);
  // Agrupar runs consecutivos del mismo tipo para un resaltado continuo
  let html="", buf="", run=null;
  const flush=()=>{
    if(!buf) { run=null; return; }
    if(run==="equal") html+=esc(buf);
    else if(run==="del"){ if(side!=="new") html+='<del class="w-del">'+esc(buf)+'</del>'; }
    else if(run==="add"){ if(side!=="old") html+='<ins class="w-add">'+esc(buf)+'</ins>'; }
    buf=""; run=null;
  };
  for(const op of ops){
    const t = op.type==="equal"?"equal":op.type;
    const txt = op.type==="del"?op.a : op.type==="add"?op.b : op.a;
    if(t!==run){ flush(); run=t; }
    buf+=txt;
  }
  flush();
  return html;
}

function computeDiff(baseText, headText){
  const A=splitParagraphs(baseText), B=splitParagraphs(headText);
  return pairOps(lcsDiff(A, B, (x,y)=>norm(x)===norm(y)));
}

/* ============================================================
   RENDER
   ============================================================ */
function renderUnified(ops){
  let body="", added=0, removed=0, mod=0;
  for(const op of ops){
    if(op.type==="equal") body+=`<p class="ln ctx"><span class="txt">${esc(op.a)}</span></p>`;
    else if(op.type==="del"){ removed++; body+=`<p class="ln del"><span class="txt">${esc(op.a)}</span></p>`; }
    else if(op.type==="add"){ added++; body+=`<p class="ln add"><span class="txt">${esc(op.b)}</span></p>`; }
    else if(op.type==="mod"){ mod++; body+=`<p class="ln mod"><span class="txt">${wordDiffHtml(op.a,op.b,"both")}</span></p>`; }
  }
  return `${summaryBar(added,removed,mod)}<div class="unified">${body}</div>`;
}

function renderSplit(ops){
  let left="", right="", added=0, removed=0, mod=0;
  for(const op of ops){
    if(op.type==="equal"){
      left+=`<p>${esc(op.a)}</p>`; right+=`<p>${esc(op.b)}</p>`;
    } else if(op.type==="del"){
      removed++;
      left+=`<p class="row-del"><span class="txt">${esc(op.a)}</span></p>`;
      right+=`<p class="ghost">${esc(op.a)}</p>`;
    } else if(op.type==="add"){
      added++;
      left+=`<p class="ghost">${esc(op.b)}</p>`;
      right+=`<p class="row-add">${esc(op.b)}</p>`;
    } else if(op.type==="mod"){
      mod++;
      left+=`<p class="row-del">${wordDiffHtml(op.a,op.b,"old")}</p>`;
      right+=`<p class="row-add">${wordDiffHtml(op.a,op.b,"new")}</p>`;
    }
  }
  return `${summaryBar(added,removed,mod)}
  <div class="split">
    <div class="col old"><div class="col-head">${baseLabel()} <span class="tag">ANTES</span></div><div class="col-body">${left}</div></div>
    <div class="col new"><div class="col-head">${headLabel()} <span class="tag">DESPUÉS</span></div><div class="col-body">${right}</div></div>
  </div>`;
}

function summaryBar(a,r,m){
  return `<div class="summary-bar">
    <span class="pill add">+${a} añadidos</span>
    <span class="pill del">−${r} eliminados</span>
    <span class="pill same">✎ ${m} modificados</span>
  </div>`;
}

/* ============================================================
   ESTADO + UI
   ============================================================ */
let state = { headId:5, baseId:4, mode:"unified" };
const $ = s => document.querySelector(s);
const byId = id => VERSIONS.find(v=>v.id===id);
function baseLabel(){ const v=byId(state.baseId); return `${v.label} · ${v.date}`; }
function headLabel(){ const v=byId(state.headId); return `${v.label} · ${v.date}`; }

function initials(name){ return name.split(" ").map(s=>s[0]).join("").slice(0,2).toUpperCase(); }

function renderSidebar(){
  const wrap=$("#versions");
  wrap.innerHTML = '<div class="rail"></div>' + [...VERSIONS].reverse().map(v=>{
    const isHead = v.id===state.headId;
    return `<div class="vcard ${isHead?'active':''}" data-id="${v.id}">
      <div class="vtop">
        <span class="vlabel">${v.label}</span>
        ${v.id===VERSIONS.length?'<span class="vcur">ACTUAL</span>':''}
      </div>
      <div class="vmeta">
        <span class="avatar" style="background:${v.color}">${initials(v.author)}</span>
        ${v.author} · ${v.date}
      </div>
      <div class="vsum">${v.summary}</div>
    </div>`;
  }).join("");
  wrap.querySelectorAll(".vcard").forEach(c=>{
    c.onclick = ()=>{
      const id=+c.dataset.id;
      state.headId=id;
      state.baseId = id>1 ? id-1 : 1;   // comparar con la versión anterior
      syncSelects(); render();
    };
  });
}

function fillSelect(sel, selectedId){
  sel.innerHTML = VERSIONS.map(v=>`<option value="${v.id}" ${v.id===selectedId?'selected':''}>v${v.id} · ${v.label}</option>`).join("");
}
function syncSelects(){ fillSelect($("#baseSel"),state.baseId); fillSelect($("#headSel"),state.headId); }

function render(){
  const ops = computeDiff(byId(state.baseId).text, byId(state.headId).text);
  $("#docTitle").textContent = "El auge del trabajo remoto";
  $("#side-sub").textContent = `Comparando v${state.baseId} → v${state.headId}`;
  $("#sheet").innerHTML = state.mode==="unified" ? renderUnified(ops) : renderSplit(ops);
  document.querySelectorAll("#versions .vcard").forEach(c=>{
    c.classList.toggle("active", +c.dataset.id===state.headId);
  });
  document.querySelectorAll("#toggle button").forEach(b=>b.classList.toggle("on", b.dataset.mode===state.mode));
}

/* listeners */
$("#toggle").addEventListener("click", e=>{
  const b=e.target.closest("button"); if(!b) return;
  state.mode=b.dataset.mode; render();
});
$("#baseSel").addEventListener("change", e=>{ state.baseId=+e.target.value; render(); });
$("#headSel").addEventListener("change", e=>{ state.headId=+e.target.value; renderSidebar(); render(); });

/* init */
renderSidebar(); syncSelects(); render();
</script>
</body>
</html>
